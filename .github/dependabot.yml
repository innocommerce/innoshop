version: 2
updates:
  - package-ecosystem: composer
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      php-minor:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    labels:
      - dependencies
      - php

  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      js-minor:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    labels:
      - dependencies
      - javascript

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(ci)'
      include: scope
    labels:
      - dependencies
      - github-actions
